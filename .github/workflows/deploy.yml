name: Deploy Flow Frontend to Server

on:
  push:
    branches:
      - develop
      - qa
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4
      with:
        path: workspace/this-repo

    - name: Checkout shell-fe
      uses: actions/checkout@v4
      with:
        repository: Neonbee-ai/so360-shell-fe
        ref: ${{ github.ref_name }}
        path: workspace/so360-shell-fe
        token: ${{ secrets.PAT_TOKEN }}

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build shell-fe shared packages
      working-directory: workspace/so360-shell-fe
      run: |
        (cd packages/shell-context && npm install --no-audit --no-fund && npm run build)
        (cd packages/design-system && npm install --no-audit --no-fund && npm run build)
        (cd packages/event-bus     && npm install --no-audit --no-fund && npm run build)
        (cd packages/formatters    && npm install --no-audit --no-fund && npm run build)

    - name: Build artefact on runner
      working-directory: workspace/this-repo
      run: |
        npm install --legacy-peer-deps --no-audit --no-fund --prefer-offline

        # file:../../so360-shell-fe deps don't resolve cleanly in this nested
        # layout — cp built shell-fe packages directly into node_modules/@so360.
        mkdir -p node_modules/@so360
        for pkg in shell-context design-system event-bus formatters; do
          rm -rf "node_modules/@so360/$pkg"
          cp -r "../so360-shell-fe/packages/$pkg" "node_modules/@so360/$pkg"
        done

        if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
          export VITE_BASE_URL=https://dev.flow.skyoffice360.com/
          export VITE_SO360_CORE_API=https://dev.api.skyoffice360.com/core
          export VITE_SO360_FLOW_API=https://dev.api.skyoffice360.com/flow
        elif [ "${{ github.ref }}" = "refs/heads/qa" ]; then
          export VITE_BASE_URL=https://staging.flow.skyoffice360.com/
          export VITE_SO360_CORE_API=https://staging.api.skyoffice360.com/core
          export VITE_SO360_FLOW_API=https://staging.api.skyoffice360.com/flow
        elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
          export VITE_BASE_URL=https://cdn.neonbee.app/flow/
          export VITE_SO360_CORE_API=https://api.neonbee.app/core
          export VITE_SO360_CRM_API=https://api.neonbee.app/crm
          export VITE_SO360_INVENTORY_API=https://api.neonbee.app/inventory
          export VITE_SO360_ACCOUNTING_API=https://api.neonbee.app/accounting
          export VITE_SO360_PROJECTS_API=https://api.neonbee.app/projects
          export VITE_SO360_TIMESHEET_API=https://api.neonbee.app/timesheet
          export VITE_SO360_PEOPLE_API=https://api.neonbee.app/people
          export VITE_SO360_DAILYSTORE_API=https://api.neonbee.app/dailystore
          export VITE_SO360_NEURA_API=https://api.neonbee.app/neura
          export VITE_SO360_FLOW_API=https://api.neonbee.app/flow
          export VITE_SO360_INSIGHT_API=https://api.neonbee.app/insight
          export VITE_SO360_INBOX_API=https://api.neonbee.app/inbox
          export VITE_SO360_FORMS_API=https://api.neonbee.app/forms
          export VITE_SO360_FULFILLMENT_API=https://api.neonbee.app/fulfillment
          export VITE_SO360_SUPPORT_API=https://api.neonbee.app/support
          export VITE_SO360_SUBSCRIPTION_API=https://api.neonbee.app/subscription
          export VITE_SO360_STOREFRONT_PREVIEW_URL=https://neonbee.store
        fi
        npm run build

    - name: Deploy dist to Dev
      if: github.ref == 'refs/heads/develop'
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        NGINX_ROOT: /var/www/dev.flow.skyoffice360.com/html
      run: |
        SSH_OPTS="-o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=30"
        ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
        ssh $SSH_OPTS root@$SERVER_IP "mkdir -p '$NGINX_ROOT' && rm -rf '$NGINX_ROOT'/*"
        rsync -avz --delete -e "ssh $SSH_OPTS" workspace/this-repo/dist/ "root@$SERVER_IP:$NGINX_ROOT/"
        echo "✅ Deployed to https://dev.flow.skyoffice360.com"

    - name: Deploy dist to Staging
      if: github.ref == 'refs/heads/qa'
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        NGINX_ROOT: /var/www/staging.flow.skyoffice360.com/html
      run: |
        SSH_OPTS="-o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=30"
        ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
        ssh $SSH_OPTS root@$SERVER_IP "mkdir -p '$NGINX_ROOT' && rm -rf '$NGINX_ROOT'/*"
        rsync -avz --delete -e "ssh $SSH_OPTS" workspace/this-repo/dist/ "root@$SERVER_IP:$NGINX_ROOT/"
        echo "✅ Deployed to https://staging.flow.skyoffice360.com"

    - name: Deploy dist to Production
      if: github.ref == 'refs/heads/main'
      env:
        SERVER_IP: ${{ secrets.PROD_NGINX_VM }}
        NGINX_ROOT: /var/www/cdn.neonbee.app/html/flow
      run: |
        SSH_OPTS="-o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=30"
        ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
        ssh $SSH_OPTS root@$SERVER_IP "mkdir -p '$NGINX_ROOT' && rm -rf '$NGINX_ROOT'/*"
        rsync -avz --delete -e "ssh $SSH_OPTS" workspace/this-repo/dist/ "root@$SERVER_IP:$NGINX_ROOT/"
        echo "✅ Deployed to https://cdn.neonbee.app/flow/"

    - name: Purge Cloudflare cache for /flow/
      if: github.ref == 'refs/heads/main'
      continue-on-error: true
      run: |
        echo "🌀 Purging cdn.neonbee.app/flow/ from Cloudflare edge cache"
        RESP=$(curl -sX POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CF_PURGE_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"files":["https://cdn.neonbee.app/flow/assets/remoteEntry.js","https://cdn.neonbee.app/flow/index.html"]}')
        echo "$RESP"
        echo "$RESP" | grep -q '"success":true' || { echo "⚠️ CF purge failed (deploy still succeeded)"; exit 0; }
        echo "✅ Cloudflare cache purged for /flow/"
